name: 部署到云服务器

# 触发条件：推送到 main 分支时
on:
  push:
    branches: ["publish"]
    paths-ignore:
      - 'server/**'
      - '.github/workflows/server.yml'
      - '.github/workflows/deploy.yml'

# 定义所有任务
jobs:
  build-and-deploy:
    # 运行环境：Ubuntu 最新版
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
    steps:
      # 1. 拉取代码
      - name: pull store
        uses: actions/checkout@v4
      # 1.1 安装 pnpm
      - name: install pnpm
        uses: pnpm/action-setup@v4
        with:
          version: "10.28.1"
      # 2. 设置 Node.js 环境
      - name: install node
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "pnpm"
      # 3. 安装依赖并构建
      - name: 安装依赖并打包
        run: |
          pnpm install
          pnpm run build

      # 4. 部署到云服务器
      - name: 通过 SSH 部署
        uses: appleboy/scp-action@v0.1.5 # 文件传输专用
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USERNAME }}
          key: ${{ secrets.SERVER_SSH_KEY }}
          port: 22
          # 将构建产物传到服务器的指定目录
          source: "dist/*" # 如果你用 npm run build 生成的是 build/ 就改成 build/*
          target: "/var/muxiao/blogs"
          strip_components: 1 # 去除 dist/ 这一层目录


      # 5. 重启服务（如果使用 PM2 或 Nginx）
