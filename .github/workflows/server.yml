name: Deploy Server

on:
  push:
    branches:
      - server
    paths:
      - 'server/**'
      - '.github/workflows/server.yml'
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install pnpm
        uses: pnpm/action-setup@v4
        with:
          version: "10.28.1"

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'pnpm'
          cache-dependency-path: 'server/pnpm-lock.yaml'

      - name: Install dependencies
        run: cd server && pnpm install

      - name: Build
        run: cd server && pnpm run build

      - name: Deploy to server
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USERNAME }}
          key: ${{ secrets.SERVER_SSH_KEY }}
          port: 22
          source: "server/dist/"
          target: "/var/muxiao-server/blogs-new"
          strip_components: 2

      - name: Backup and replace
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USERNAME }}
          key: ${{ secrets.SERVER_SSH_KEY }}
          port: 22
          script: |
            cd /var/muxiao-server
            
            # 保留最近5个备份，删除更早的
            ls -t | grep "blogs.backup." | tail -n +6 | xargs -r rm -rf
            
            # 备份当前版本
            if [ -d "blogs" ]; then
              mv blogs "blogs.backup.$(date +%Y%m%d_%H%M%S)"
            fi
            
            # 部署新版本
            mv blogs-new blogs
            rm -rf blogs-new
            
            # 重启 PM2 服务（如果有）
            # pm2 reload ecosystem.config.js --update-env
            sudo systemctl restart lumina-blog
            sleep 2
            systemctl status lumina-blog --no-pager
            echo "✅ Deployment completed at $(date)"