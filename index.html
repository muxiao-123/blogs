<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Lumina Blog - 探索技术的星辰大海</title>
    <meta
      name="description"
      content="Lumina Blog - 探索技术的星辰大海，分享前端、后端、全栈开发知识"
    />

    <!-- 主题初始化脚本：在 CSS 加载前执行，避免闪烁 -->
    <script>
      ;(function () {
        const stored = localStorage.getItem('theme')
        const theme =
          stored || (window.matchMedia('(prefers-color-scheme: dark)').matches ? 'dark' : 'light')
        document.documentElement.setAttribute('data-theme', theme)
      })()
    </script>

    <!-- 预连接外部资源 -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />

    <!-- 异步加载字体，避免阻塞渲染 -->
    <link
      rel="stylesheet"
      href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500&family=Outfit:wght@400;500;600;700&family=Source+Sans+3:wght@400;500;600&display=swap"
      media="print"
      onload="this.media = 'all'"
    />
    <noscript>
      <link
        rel="stylesheet"
        href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500&family=Outfit:wght@400;500;600;700&family=Source+Sans+3:wght@400;500;600&display=swap"
      />
    </noscript>

    <!-- 预加载 CSS（由 Vite 构建时替换）-->
    <!--PRELOAD_CSS-->
  </head>
  <body>
    <div id="app"></div>
    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
